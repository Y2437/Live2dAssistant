<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="utf-8">
    <title>Live2D Assistant</title>
    <script src="../vendor/live2d/live2dcubismcore.min.js" defer></script>
    <script src="../vendor/pixi/pixi.min.js" defer></script>
    <script src="../vendor/live2d/cubism4.min.js" defer></script>
    <script type="module" src="../js/assistant/index.js" defer></script>

    <link rel="stylesheet" href="../css/theme/light.css">
    <link rel="stylesheet" href="../css/theme/dark.css">
    <link rel="stylesheet" href="../css/style/shell.css">
    <link rel="stylesheet" href="../css/style/views.css">
    <link rel="stylesheet" href="../css/style/standalone.css">
    <link rel="stylesheet" href="../css/style/assistant.css">
</head>
<body class="window-page">
<main class="window-main">
    <header class="placeholder-card window-panel window-hero">
        <h1 class="window-title">看板娘</h1>
        <p class="window-subtitle">独立窗口模式下的主桌宠窗口。这里保留 Live2D、快捷入口和对话输入。</p>
    </header>

    <section class="window-panel window-panel--wide">
        <div class="assistant-root">
            <div class="placeholder-card">
                <div class="assistant-live2d" data-slot="assistant-live2d">
                    <div class="assistant-bubble" data-role="assistant-bubble" data-state="idle" aria-live="polite"></div>
                    <div class="assistant-live2d__stage" data-role="assistant-live2d-stage"></div>
                </div>
            </div>

            <div class="assistant-panel" data-role="assistant-panel">
                <div class="assistant-actions" data-role="assistant-actions">
                    <button type="button" class="assistant-actionBtn" data-action="pomodoro">番茄钟</button>
                    <button type="button" class="assistant-actionBtn" data-action="cards">知识卡片</button>
                    <button type="button" class="assistant-actionBtn" data-action="clipboard">剪贴板</button>
                </div>

                <div class="assistant-inputRow">
                    <form class="assistant-form">
                        <label for="assistant-input">
                            <input
                                id="assistant-input"
                                class="assistant-input"
                                data-role="assistant-input"
                                type="text"
                                placeholder="输入内容，例如 open pomodoro"
                                autocomplete="off"
                                spellcheck="false"
                            />
                        </label>
                        <button type="submit" class="assistant-send" data-role="assistant-send">发送</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
