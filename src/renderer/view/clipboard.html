<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="utf-8">
    <title>Clipboard</title>
    <script type="module" src="../js/clipboard/index.js" defer></script>
    <link rel="stylesheet" href="../css/theme/light.css">

    <link rel="stylesheet" href="../css/style/shell.css">
