<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="utf-8">
    <title>资料整理器</title>
    <link rel="stylesheet" href="../css/theme/light.css">
    <link rel="stylesheet" href="../css/theme/dark.css">
    <link rel="stylesheet" href="../css/style/shell.css">
    <link rel="stylesheet" href="../css/style/views.css">
    <link rel="stylesheet" href="../css/style/standalone.css">
    <link rel="stylesheet" href="../css/style/organizer.css">
</head>
<body class="window-page">
<main class="window-main">
    <header class="placeholder-card window-panel window-hero">
        <h1 class="window-title">资料整理器</h1>
        <p class="window-subtitle">这里承载资料库的独立工作台，用于进入具体资料库、浏览分类与目录，并阅读文件正文。</p>
    </header>

    <section class="window-panel">
        <div class="organizer-root">
            <div class="placeholder-card">
                <h3 class="placeholder-title">资料整理器占位</h3>
                <p class="placeholder-desc">资料库组件会挂载在这里。</p>
                <div class="placeholder-slot" data-slot="organizer"></div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
